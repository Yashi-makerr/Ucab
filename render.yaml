services:
  # ── Backend API + Socket.io ───────────────────────────────────────
  - type: web
    name: ucab-backend
    runtime: node
    plan: free
    rootDir: Backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── Frontend (Static Site) ────────────────────────────────────────
  - type: static
    name: ucab-frontend
    plan: free
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html