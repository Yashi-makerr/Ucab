# Render only handles the Frontend (Static Site — free, no card required)
# Backend is deployed separately on Railway (free, no card required)

services:
  - type: web
    name: ucab-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to: https://ucab-backend.up.railway.app/api
      - key: VITE_SOCKET_URL
        sync: false   # set to: https://ucab-backend.up.railway.app
    routes:
      - type: rewrite
        source: /*
        destination: /index.html