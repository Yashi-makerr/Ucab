services:
  # ── Backend API + Socket.io ───────────────────────────────────────
  - type: web
    name: ucab-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # set this in Render dashboard > Environment
      - key: JWT_SECRET
        sync: false   # set this in Render dashboard > Environment

  # ── Frontend (Static Site) ────────────────────────────────────────
  - type: web
    name: ucab-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to https://ucab-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        sync: false   # set to https://ucab-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
